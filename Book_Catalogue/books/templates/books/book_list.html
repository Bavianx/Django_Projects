<!DOCTYPE html>
<html>
<head>
    <title>Book Catalogue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1 class="mb-4"> Book Catalogue</h1>
    <a href="/books/add/" class="btn btn-primary mb-3">Add Book</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td><a href="/books/{{ book.pk }}/">{{ book.title }}</a></td>
                <td>{{ book.author }}</td>
                <td>{{ book.isbn }}</td>
                <td>{% if book.available %}✅ Available{% else %}❌ Checked Out{% endif %}</td>
                <td>
                    <a href="/books/edit/{{ book.pk }}/" class="btn btn-sm btn-warning">Edit</a>
                    <form method="post" action="/books/delete/{{ book.pk }}/" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>       
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
